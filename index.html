<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f7f7fa" />
  <title>Social reps</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f7fa;
      --card: #ffffff;
      --text: #1c1c1e;
      --muted: #8a8a8e;
      --border: rgba(0, 0, 0, 0.08);
      --track: #e3e3e8;
      --accent: #d9694c;
      --accent-soft: rgba(217, 105, 76, 0.12);
      --green: #3a9a9a;
      --green-bar: #3a9a9a;
      --green-soft: rgba(58, 154, 154, 0.14);
      --radius-xl: 18px;
      --radius-lg: 16px;
      --shadow: 0 1px 2px rgba(0, 0, 0, 0.06), 0 4px 12px rgba(0, 0, 0, 0.04);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html {
      -webkit-tap-highlight-color: transparent;
      font-size: 110%;
    }

    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }

    .app {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100dvh;
      padding-bottom: calc(1.5rem + var(--safe-bottom));
    }

    .hidden { display: none !important; }

    /* —— Home —— */
    .home-hero {
      padding: 2rem 1.25rem 1rem;
    }

    .home-hero h1 {
      font-size: 1.85rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.15;
      color: var(--text);
    }

    .home-hero p {
      margin-top: 0.35rem;
      font-size: 0.95rem;
      color: var(--muted);
      font-weight: 500;
    }

    .week-stat-card {
      margin: 0 1rem 1.25rem;
      background: var(--card);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      padding: 1.35rem 1.25rem;
    }

    .week-stat-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .week-stat-row {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      margin-top: 0.35rem;
    }

    .week-stat-num {
      font-size: 2.75rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1;
      color: var(--green-bar);
    }

    .week-stat-of {
      font-size: 1rem;
      color: var(--muted);
      font-weight: 500;
    }

    .week-dots {
      display: flex;
      gap: 8px;
      margin-top: 1.25rem;
      flex-wrap: wrap;
    }

    .week-dot {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 2px solid var(--track);
      background: var(--card);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .week-dot.done {
      background: var(--green);
      border-color: var(--green);
      color: #fff;
    }

    .week-dot.done::after {
      content: "✓";
      font-size: 0.8rem;
      font-weight: 700;
    }

    .route-section {
      padding: 0 1rem;
    }

    .section-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.65rem;
      padding-left: 0.15rem;
    }

    .route-card {
      background: var(--card);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      padding: 1rem 1.15rem;
      margin-bottom: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: transform 0.15s ease;
    }

    .route-card:active { transform: scale(0.98); }

    .route-name {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
    }

    .route-meta {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 3px;
      font-weight: 500;
    }

    .route-progress-track {
      height: 6px;
      background: var(--track);
      border-radius: 99px;
      overflow: hidden;
    }

    .route-progress-track.tall {
      height: 8px;
    }

    .route-progress-fill {
      display: block;
      height: 100%;
      background: var(--green-bar);
      border-radius: 99px;
      transition: width 0.3s ease;
    }

    .route-progress-mini {
      margin-top: 10px;
      max-width: 100%;
    }

    .route-progress-block {
      margin-top: 0;
    }

    .route-progress-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .route-progress-label strong {
      color: var(--text);
      font-weight: 600;
    }

    .route-arrow {
      font-size: 1.25rem;
      color: var(--accent);
      font-weight: 400;
    }

    /* —— Stops —— */
    .screen-header {
      padding: 1rem 1.25rem 0.5rem;
    }

    .stops-header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .stops-header-row .screen-title {
      flex: 1;
      min-width: 0;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: none;
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--accent);
      cursor: pointer;
      padding: 0.25rem 0;
      margin-bottom: 0.75rem;
    }

    .back-btn:active { opacity: 0.6; }

    .screen-title {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--text);
    }

    .progress-card {
      margin: 0.5rem 1rem 1rem;
      background: var(--card);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      padding: 1.15rem 1.2rem;
    }

    .reset-today-btn {
      flex-shrink: 0;
      padding: 0.45rem 0.7rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--card);
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, color 0.15s;
    }

    .reset-today-btn:active {
      background: var(--bg);
      color: var(--text);
    }

    .reset-today-btn.hidden {
      display: none;
    }

    .detail-progress {
      margin: 0 1rem 1rem;
      padding: 0 0.15rem;
    }

    .stop-list {
      padding: 0 1rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .stop-card {
      background: var(--card);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      padding: 0.9rem 1rem;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.2s;
    }

    .stop-card:active { transform: scale(0.98); }

    .stop-card.done {
      border-color: rgba(58, 154, 154, 0.35);
    }

    .stop-check {
      width: 30px;
      height: 30px;
      min-width: 30px;
      border-radius: 50%;
      border: 2px solid var(--track);
      background: var(--card);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      transition: background 0.2s, border-color 0.2s;
    }

    .stop-card.done .stop-check {
      background: var(--green);
      border-color: var(--green);
      color: #fff;
    }

    .stop-card.done .stop-label {
      color: var(--muted);
    }

    .stop-card.done .stop-check::after {
      content: "✓";
    }

    .stop-card.done .stop-check .stop-num-inner {
      display: none;
    }

    .stop-label {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
    }

    .stop-preview {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 260px;
    }

    .stop-chevron {
      margin-left: auto;
      color: #c7c7cc;
      font-size: 1.1rem;
    }

    /* —— Detail —— */
    .detail-body {
      padding: 0 1rem 7.5rem;
    }

    .line-card {
      border-radius: var(--radius-lg);
      padding: 1.15rem 1.2rem;
      margin-bottom: 10px;
      background: var(--card);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    .line-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .line-text {
      font-size: calc(1.05rem * 0.95);
      line-height: 1.5;
      font-weight: 500;
      color: var(--text);
    }

    .script-line-second {
      display: block;
      margin-top: 0.45em;
    }

    .line-text em,
    .pick-opener em,
    .pick-followup em {
      font-style: italic;
    }

    .arrow-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 1.35rem 0 0.75rem 0.5rem;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .detail-body .line-card:first-child {
      margin-bottom: 0;
    }

    .pick-section .pick-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .pick-card {
      background: var(--card);
      border-radius: var(--radius-lg);
      padding: 1rem 1.1rem;
      margin-bottom: 8px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    .pick-place {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 6px;
    }

    .pick-opener {
      font-size: 0.95rem;
      font-weight: 600;
      line-height: 1.45;
      color: var(--text);
    }

    .pick-followup {
      font-size: 0.88rem;
      color: var(--muted);
      margin-top: 8px;
      line-height: 1.4;
      font-weight: 500;
    }

    .detail-footer {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      padding: 1rem 1.25rem calc(1rem + var(--safe-bottom));
      background: linear-gradient(transparent, var(--bg) 35%);
    }

    .detail-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .rep-center {
      flex: 1;
      min-width: 0;
    }

    .nav-arrow {
      flex: 0 0 48px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: none;
      background: var(--card);
      color: var(--accent);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      font-size: 1.6rem;
      line-height: 1;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      padding-bottom: 2px;
      transition: transform 0.15s ease, opacity 0.2s;
    }

    .nav-arrow:disabled {
      opacity: 0.25;
      cursor: default;
    }

    .nav-arrow:active:not(:disabled) {
      transform: scale(0.92);
    }

    .rep-btn {
      width: 100%;
      min-height: 52px;
      border: none;
      border-radius: 999px;
      padding: 0 1.25rem;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.2s, border-color 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .rep-btn.ghost {
      background: var(--card);
      color: var(--green);
      border: 2px solid var(--green);
      box-shadow: var(--shadow);
    }

    .rep-btn.logged {
      background: var(--green);
      color: #fff;
      border: 2px solid var(--green);
    }

    .rep-btn.ghost:active,
    .rep-btn.logged:active {
      transform: scale(0.97);
    }

    #detail-screen {
      touch-action: pan-y;
    }

    .detail-body.is-swiping {
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .detail-body.slide-out-left {
      transform: translateX(-28px);
      opacity: 0.4;
    }

    .detail-body.slide-out-right {
      transform: translateX(28px);
      opacity: 0.4;
    }

    .toast {
      position: fixed;
      top: 1rem;
      left: 50%;
      transform: translateX(-50%) translateY(-180%);
      background: var(--text);
      color: #fff;
      padding: 0.65rem 1.25rem;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 600;
      z-index: 100;
      opacity: 0;
      visibility: hidden;
      transition: transform 0.3s ease, opacity 0.3s ease, visibility 0.3s;
      pointer-events: none;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
      visibility: visible;
    }

    .route-complete-banner {
      margin: 0 1rem 1rem;
      background: var(--green-soft);
      color: #2a7a7a;
      border-radius: var(--radius-lg);
      padding: 1rem 1.2rem;
      font-weight: 600;
      font-size: 0.9rem;
      text-align: center;
      animation: pop 0.4s ease;
    }

    @keyframes pop {
      0% { transform: scale(0.95); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
    }
  </style>
</head>
<body>
  <h1 class="sr-only">Social reps — conversation practice for Arlington routes</h1>

  <div class="app">
    <div id="toast" class="toast" aria-live="polite"></div>

    <!-- Home -->
    <div id="home-screen">
      <div class="home-hero">
        <h1>Social reps.</h1>
        <p>Log interactions as you go about your day.</p>
      </div>

      <div class="week-stat-card">
        <div class="week-stat-label">Routes this week</div>
        <div class="week-stat-row">
          <span class="week-stat-num" id="week-route-count">0</span>
          <span class="week-stat-of">of 4</span>
        </div>
        <div class="week-dots" id="week-dots"></div>
      </div>

      <div class="route-section">
        <div class="section-label">Your routes</div>
        <div id="route-list"></div>
      </div>
    </div>

    <!-- Stops -->
    <div id="stops-screen" class="hidden">
      <div class="screen-header">
        <button type="button" class="back-btn" id="stops-back">← Routes</button>
        <div class="stops-header-row">
          <div class="screen-title" id="stops-title"></div>
          <button type="button" class="reset-today-btn hidden" id="reset-today-btn">Reset today</button>
        </div>
      </div>

      <div id="route-complete-banner" class="route-complete-banner hidden">Route complete — counted for this week.</div>

      <div class="progress-card">
        <div class="route-progress-block">
          <div class="route-progress-label">
            <span>Today's progress</span>
            <strong id="progress-fraction">0 / 0</strong>
          </div>
          <div class="route-progress-track tall">
            <span class="route-progress-fill" id="progress-bar-fill" style="width: 0%"></span>
          </div>
        </div>
      </div>

      <div class="stop-list" id="stop-list"></div>
    </div>

    <!-- Detail -->
    <div id="detail-screen" class="hidden">
      <div class="screen-header">
        <button type="button" class="back-btn" id="detail-back">← <span id="detail-back-label"></span></button>
        <div class="screen-title" id="detail-title"></div>
      </div>
      <div class="detail-progress">
        <div class="route-progress-block">
          <div class="route-progress-label">
            <span>Route progress</span>
            <strong id="detail-progress-text">0 / 0</strong>
          </div>
          <div class="route-progress-track tall">
            <span class="route-progress-fill" id="detail-progress-fill" style="width: 0%"></span>
          </div>
        </div>
      </div>
      <div class="detail-body" id="detail-body"></div>
      <div class="detail-footer">
        <div class="detail-actions">
          <button type="button" class="nav-arrow" id="prev-btn" aria-label="Previous interaction">‹</button>
          <div class="rep-center">
            <button type="button" class="rep-btn ghost" id="rep-btn">Log rep</button>
          </div>
          <button type="button" class="nav-arrow" id="next-btn" aria-label="Next interaction">›</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "dailyReps";

    const routes = [
      {
        id: "safeway",
        name: "Safeway",
        stops: [
          { label: "Dog walker", opener: "What's his name? He looks like a [name].", followup: "How old is he? He's still got that puppy energy." },
          { label: "Person on the street", opener: "Is the Safeway just down here? Sorry, I'm new here.", followup: "Nice store? — what's better?" },

              { place: "Cafe (sitting, reading)", opener: "Good book?", followup: "Worth picking up?" }
            ]
          },
          { label: "Person sitting (walking back)", opener: "You know if there's a good coffee spot nearby?", followup: "Nice — you from around here?" },
          { label: "Person walking (walking back)", opener: "Long day?", followup: "Nice out though, right?" }
        ]
      },
      {
        id: "georgetown",
        name: "Georgetown and back",
        stops: [
          { label: "Metro", opener: "Is the metro right up here? Sorry, I'm new.", followup: "Nice area — you been here long?" },
          { label: "Dog walker", opener: "What's his name?", followup: "He looks like a [name]." },
          { label: "Person walking by", opener: "Hey, is there a good coffee spot around here?", followup: "Perfect, thank you." },
          { label: "Person at a stoplight", opener: "Long day?", followup: "Nice out though, right?" },
          { label: "Barista", opener: "What's your most popular thing?", followup: "Okay — and what would you actually get?" },
          { label: "People walking past", opener: "Nice day for it.", followup: "You know this area well?" },
          {
            label: "Pick one stop",
            picks: [
              { place: "Furniture store", opener: "Do you actually help people design their place or just sell furniture?", followup: "That's cool — what's the most common thing people get wrong?" },
              { place: "Clothing store", opener: "Is this popular? You think I'd look good in this?", followup: "That's what I needed to hear." },
              { place: "Bookstore", opener: "Have you read any of these?", followup: "Anything worth getting?" },
              { place: "Ice cream / cupcake shop", opener: "What did you get — is it good?", followup: "Okay now I have to go in." }
            ]
          },
          { label: "Georgetown waterfront", opener: "Nice view huh? You come here a lot?", followup: "Nice — I'm still finding my way around." },
          { label: "Person outside store", opener: "Hey, are you from here? Sorry, I'm new...do you know of a good place to eat around here?", followup: "thanks, I appreciate it." },
          { label: "Person walking back", opener: "Long day?", followup: "Nice out though, right?" }
        ]
      }
    ];

    let currentRouteIdx = null;
    let currentStopIdx = null;
    let state = loadState();

    function todayStr() {
      const d = new Date();
      return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
    }

    function getMonday(d) {
      const copy = new Date(d);
      const day = copy.getDay();
      const diff = copy.getDate() - day + (day === 0 ? -6 : 1);
      copy.setDate(diff);
      copy.setHours(0, 0, 0, 0);
      return copy;
    }

    function weekKey() {
      const monday = getMonday(new Date());
      return monday.getFullYear() + "-W" + String(monday.getMonth() + 1).padStart(2, "0") + "-" + String(monday.getDate()).padStart(2, "0");
    }

    function defaultState() {
      return {
        weekKey: weekKey(),
        weekCompletions: [],
        today: todayStr(),
        todayReps: {}
      };
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        const s = raw ? JSON.parse(raw) : defaultState();
        return normalizeState(s);
      } catch {
        return defaultState();
      }
    }

    function normalizeState(s) {
      const base = defaultState();
      const out = {
        weekKey: s.weekKey || base.weekKey,
        weekCompletions: Array.isArray(s.weekCompletions) ? s.weekCompletions : [],
        today: s.today || base.today,
        todayReps: s.todayReps && typeof s.todayReps === "object" ? s.todayReps : {}
      };

      if (out.weekKey !== weekKey()) {
        out.weekKey = weekKey();
        out.weekCompletions = [];
      }
      if (out.today !== todayStr()) {
        out.today = todayStr();
        out.todayReps = {};
      }
      return out;
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function stopId(routeIdx, stopIdx) {
      return routeIdx + "-" + stopIdx;
    }

    function getRepsForRoute(routeId) {
      return state.todayReps[routeId] || [];
    }

    function isRepDone(routeIdx, stopIdx) {
      const route = routes[routeIdx];
      return getRepsForRoute(route.id).includes(stopId(routeIdx, stopIdx));
    }

    function toggleRep(routeIdx, stopIdx) {
      const route = routes[routeIdx];
      const sid = stopId(routeIdx, stopIdx);
      const reps = getRepsForRoute(route.id).slice();
      const idx = reps.indexOf(sid);
      if (idx >= 0) reps.splice(idx, 1);
      else reps.push(sid);
      state.todayReps[route.id] = reps;
      saveState();
      maybeCreditRoute(routeIdx);
      return idx < 0;
    }

    function routeRepCount(routeIdx) {
      const route = routes[routeIdx];
      return getRepsForRoute(route.id).length;
    }

    function isRouteComplete(routeIdx) {
      return routeRepCount(routeIdx) >= routes[routeIdx].stops.length;
    }

    function maybeCreditRoute(routeIdx) {
      const route = routes[routeIdx];
      if (!isRouteComplete(routeIdx)) return;

      const today = todayStr();
      const already = state.weekCompletions.some(
        (c) => c.routeId === route.id && c.date === today
      );
      if (already) return;

      state.weekCompletions.push({ routeId: route.id, date: today });
      saveState();
    }

    function weekRouteCount() {
      if (state.weekKey !== weekKey()) return 0;
      const seen = new Set();
      state.weekCompletions.forEach((c) => {
        if (isDateInWeek(c.date)) seen.add(c.routeId);
      });
      return seen.size;
    }

    function isDateInWeek(dateStr) {
      const d = new Date(dateStr + "T12:00:00");
      const monday = getMonday(new Date());
      const sunday = new Date(monday);
      sunday.setDate(monday.getDate() + 6);
      sunday.setHours(23, 59, 59, 999);
      return d >= monday && d <= sunday;
    }

    function showToast(msg) {
      const el = document.getElementById("toast");
      el.textContent = msg;
      el.classList.add("show");
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => el.classList.remove("show"), 1800);
    }

    function showScreen(name) {
      document.getElementById("home-screen").classList.toggle("hidden", name !== "home");
      document.getElementById("stops-screen").classList.toggle("hidden", name !== "stops");
      document.getElementById("detail-screen").classList.toggle("hidden", name !== "detail");
    }

    function renderHome() {
      state = normalizeState(state);
      saveState();

      document.getElementById("week-route-count").textContent = weekRouteCount();

      const dotsEl = document.getElementById("week-dots");
      dotsEl.innerHTML = "";
      routes.forEach((r) => {
        const doneThisWeek = state.weekCompletions.some((c) => c.routeId === r.id && isDateInWeek(c.date));
        const dot = document.createElement("div");
        dot.className = "week-dot" + (doneThisWeek ? " done" : "");
        dot.title = r.name;
        dot.setAttribute("aria-label", r.name + (doneThisWeek ? " completed this week" : ""));
        dotsEl.appendChild(dot);
      });

      const list = document.getElementById("route-list");
      list.innerHTML = "";
      routes.forEach((route, i) => {
        const done = routeRepCount(i);
        const total = route.stops.length;
        const pct = total ? (done / total) * 100 : 0;
        const card = document.createElement("div");
        card.className = "route-card";
        card.innerHTML =
          '<div><div class="route-name">' +
          escapeHtml(route.name) +
          '</div><div class="route-meta">' +
          (done > 0 ? done + " / " + total + " reps today" : total + " stops") +
          '</div><div class="route-progress-mini route-progress-track"><span class="route-progress-fill" style="width:' +
          pct +
          '%"></span></div></div><span class="route-arrow">›</span>';
        card.onclick = () => showStops(i);
        list.appendChild(card);
      });
    }

    function showHome() {
      state = normalizeState(state);
      renderHome();
      showScreen("home");
    }

    function updateRouteProgressUI(routeIdx) {
      const done = routeRepCount(routeIdx);
      const total = routes[routeIdx].stops.length;
      const pct = total ? Math.round((done / total) * 100) : 0;
      const text = done + " / " + total;

      const stopsFraction = document.getElementById("progress-fraction");
      const stopsFill = document.getElementById("progress-bar-fill");
      if (stopsFraction) stopsFraction.textContent = text;
      if (stopsFill) stopsFill.style.width = pct + "%";

      const detailText = document.getElementById("detail-progress-text");
      const detailFill = document.getElementById("detail-progress-fill");
      if (detailText) detailText.textContent = text;
      if (detailFill) detailFill.style.width = pct + "%";

      return { done, total, pct };
    }

    function resetTodayRouteProgress(routeIdx) {
      const route = routes[routeIdx];
      const done = routeRepCount(routeIdx);
      if (done === 0) return;

      if (!confirm("Reset today's progress for this route? This can't be undone.")) return;

      state.todayReps[route.id] = [];
      const today = todayStr();
      state.weekCompletions = state.weekCompletions.filter(
        (c) => !(c.routeId === route.id && c.date === today)
      );
      saveState();
      showStops(routeIdx);
      showToast("Today's progress reset");
    }

    function showStops(routeIdx) {
      currentRouteIdx = routeIdx;
      const route = routes[routeIdx];
      document.getElementById("stops-title").textContent = route.name;

      const { done, total } = updateRouteProgressUI(routeIdx);

      const banner = document.getElementById("route-complete-banner");
      const credited = state.weekCompletions.some(
        (c) => c.routeId === route.id && c.date === todayStr()
      );
      banner.classList.toggle("hidden", !(done >= total && credited));

      document.getElementById("reset-today-btn").classList.toggle("hidden", done === 0);

      const list = document.getElementById("stop-list");
      list.innerHTML = "";
      route.stops.forEach((stop, i) => {
        const card = document.createElement("div");
        card.className = "stop-card" + (isRepDone(routeIdx, i) ? " done" : "");
        const preview = stop.picks
          ? "Choose one of " + stop.picks.length + " options"
          : openerFirstLine(stop.opener);
        card.innerHTML =
          '<div class="stop-check"><span class="stop-num-inner">' +
          (i + 1) +
          "</span></div>" +
          '<div><div class="stop-label">' +
          escapeHtml(stop.label) +
          '</div><div class="stop-preview">' +
          escapeHtml(preview) +
          '</div></div><span class="stop-chevron">›</span>';
        card.onclick = () => showDetail(i);
        list.appendChild(card);
      });

      showScreen("stops");
    }

    function showDetail(stopIdx) {
      currentStopIdx = stopIdx;
      const route = routes[currentRouteIdx];
      const stop = route.stops[stopIdx];

      document.getElementById("detail-title").textContent = stop.label;
      document.getElementById("detail-back-label").textContent = route.name;

      const body = document.getElementById("detail-body");
      if (stop.picks) {
        let html = '<div class="pick-section"><div class="pick-label">Pick one</div>';
        stop.picks.forEach((p) => {
          html +=
            '<div class="pick-card"><div class="pick-place">' +
            escapeHtml(p.place) +
            '</div><div class="pick-opener">' +
            formatScriptTwoLines(p.opener) +
            '</div><div class="pick-followup">' +
            formatScriptTwoLines(p.followup, "→ ") +
            "</div></div>";
        });
        html += "</div>";
        body.innerHTML = html;
      } else {
        body.innerHTML =
          '<div class="line-card"><div class="line-label">Opener</div><div class="line-text">' +
          formatScriptTwoLines(stop.opener) +
          '</div></div><div class="arrow-row">↓ then</div><div class="line-card"><div class="line-label">Follow up</div><div class="line-text">' +
          formatScriptTwoLines(stop.followup) +
          "</div></div>";
      }

      updateRouteProgressUI(currentRouteIdx);
      updateDetailFooter();
      showScreen("detail");
    }

    function updateRepButton() {
      const btn = document.getElementById("rep-btn");
      const done = isRepDone(currentRouteIdx, currentStopIdx);
      if (done) {
        btn.className = "rep-btn logged";
        btn.textContent = "Logged";
        btn.setAttribute("aria-label", "Rep logged. Tap to undo.");
      } else {
        btn.className = "rep-btn ghost";
        btn.textContent = "Log rep";
        btn.setAttribute("aria-label", "Log rep");
      }
    }

    function handleRepToggle() {
      const added = toggleRep(currentRouteIdx, currentStopIdx);
      updateRepButton();
      updateRouteProgressUI(currentRouteIdx);
      showToast(added ? "Rep logged" : "Rep removed");
      if (added && isRouteComplete(currentRouteIdx)) {
        setTimeout(() => showToast("Route complete this week!"), 400);
      }
    }

    function updateNavButtons() {
      const route = routes[currentRouteIdx];
      const prevBtn = document.getElementById("prev-btn");
      const nextBtn = document.getElementById("next-btn");
      prevBtn.disabled = currentStopIdx <= 0;
      nextBtn.disabled = false;
      nextBtn.setAttribute(
        "aria-label",
        currentStopIdx >= route.stops.length - 1 ? "Back to stop list" : "Next interaction"
      );
    }

    function updateDetailFooter() {
      updateRepButton();
      updateNavButtons();
    }

    function scrollDetailTop() {
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function animateDetailTransition(direction, thenFn) {
      const body = document.getElementById("detail-body");
      body.classList.add("is-swiping");
      body.classList.remove("slide-out-left", "slide-out-right");
      body.classList.add(direction === "forward" ? "slide-out-left" : "slide-out-right");
      setTimeout(() => {
        thenFn();
        body.classList.remove("slide-out-left", "slide-out-right");
        requestAnimationFrame(() => body.classList.remove("is-swiping"));
      }, 160);
    }

    function goToNextStop(animated) {
      const route = routes[currentRouteIdx];
      const advance = () => {
        if (currentStopIdx < route.stops.length - 1) {
          showDetail(currentStopIdx + 1);
          scrollDetailTop();
        } else {
          showStops(currentRouteIdx);
        }
      };
      if (animated) animateDetailTransition("forward", advance);
      else advance();
    }

    function goToPrevStop(animated) {
      const back = () => {
        if (currentStopIdx > 0) {
          showDetail(currentStopIdx - 1);
          scrollDetailTop();
        } else {
          showStops(currentRouteIdx);
        }
      };
      if (animated) animateDetailTransition("back", back);
      else back();
    }

    function initDetailSwipe() {
      const screen = document.getElementById("detail-screen");
      let startX = 0;
      let startY = 0;
      const minSwipe = 48;

      screen.addEventListener(
        "touchstart",
        (e) => {
          if (screen.classList.contains("hidden")) return;
          const t = e.changedTouches[0];
          startX = t.clientX;
          startY = t.clientY;
        },
        { passive: true }
      );

      screen.addEventListener(
        "touchend",
        (e) => {
          if (screen.classList.contains("hidden")) return;
          const t = e.changedTouches[0];
          const dx = t.clientX - startX;
          const dy = t.clientY - startY;
          if (Math.abs(dx) < minSwipe) return;
          if (Math.abs(dy) > Math.abs(dx)) return;

          if (dx < 0) {
            const route = routes[currentRouteIdx];
            if (currentStopIdx < route.stops.length - 1) goToNextStop(true);
            else showStops(currentRouteIdx);
          } else {
            goToPrevStop(true);
          }
        },
        { passive: true }
      );
    }

    function escapeHtml(s) {
      const d = document.createElement("div");
      d.textContent = s;
      return d.innerHTML;
    }

    function openerFirstLine(opener) {
      if (!opener) return "";
      let line = opener.split("\n")[0].trim();
      const end = line.search(/[.?!]/);
      if (end !== -1) line = line.slice(0, end + 1);
      return line;
    }

    function wrapQuestionItalic(text) {
      const escaped = escapeHtml(text);
      if (/\?$/.test(text.trim())) return "<em>" + escaped + "</em>";
      return escaped;
    }

    function formatScriptTwoLines(text, lead) {
      if (!text) return "";
      const trimmed = text.trim();
      const end = trimmed.search(/[.?!]/);
      const prefix = lead || "";
      if (end === -1) return prefix + wrapQuestionItalic(trimmed);
      const first = trimmed.slice(0, end + 1).trim();
      let rest = trimmed.slice(end + 1).trim().replace(/^[—–-]\s*/, "");
      if (!rest) return prefix + wrapQuestionItalic(first);
      return (
        prefix +
        wrapQuestionItalic(first) +
        '<span class="script-line-second">— ' +
        wrapQuestionItalic(rest) +
        "</span>"
      );
    }

    document.getElementById("stops-back").onclick = showHome;
    document.getElementById("reset-today-btn").onclick = () => resetTodayRouteProgress(currentRouteIdx);
    document.getElementById("detail-back").onclick = () => showStops(currentRouteIdx);

    document.getElementById("rep-btn").onclick = () => handleRepToggle();

    document.getElementById("prev-btn").onclick = () => goToPrevStop(false);
    document.getElementById("next-btn").onclick = () => goToNextStop(false);

    initDetailSwipe();
    showHome();
  </script>
</body>
</html>
