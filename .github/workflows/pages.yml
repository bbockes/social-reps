name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Generate app-config.js for cloud sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "::error::SUPABASE_URL and SUPABASE_ANON_KEY are not set for this workflow."
            echo "Add them under Settings → Secrets and variables → Actions,"
            echo "or under Settings → Environments → github-pages → Environment secrets."
            exit 1
          fi
          node scripts/generate-config.js
          if grep -q "YOUR_PROJECT" app-config.js; then
            echo "::error::app-config.js was not generated with real Supabase values."
            exit 1
          fi
          echo "Generated app-config.js ($(wc -c < app-config.js) bytes)"
          head -3 app-config.js
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
      - name: Verify live app-config.js
        run: |
          sleep 15
          URL="${{ steps.deployment.outputs.page_url }}app-config.js"
          echo "Checking $URL"
          BODY=$(curl -fsSL "$URL")
          echo "$BODY"
          if echo "$BODY" | grep -q "YOUR_PROJECT"; then
            echo "::error::Live site is still serving placeholder app-config.js."
            echo "Go to repo Settings → Pages → Build and deployment → Source"
            echo "and set it to GitHub Actions (not Deploy from a branch)."
            exit 1
          fi
          echo "Live app-config.js looks good."
