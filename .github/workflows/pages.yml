name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Generate config.js for cloud sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -n "$SUPABASE_URL" ] && [ -n "$SUPABASE_ANON_KEY" ]; then
            node <<'NODE'
            const fs = require("fs");

            function clean(value, field) {
              let v = String(value || "").trim();
              v = v.replace(new RegExp("^" + field + ":\\s*", "i"), "");
              v = v.replace(/^["']|["']$/g, "");
              return v.trim();
            }

            function normalizeSupabaseUrl(url) {
              let v = clean(url, "supabaseUrl");
              v = v.replace(/^https:\/(?!\/)/i, "https://");
              if (v && !/^https?:\/\//i.test(v)) {
                v = "https://" + v.replace(/^\/+/, "");
              }
              return v;
            }

            const config = {
              supabaseUrl: normalizeSupabaseUrl(process.env.SUPABASE_URL),
              supabaseAnonKey: clean(process.env.SUPABASE_ANON_KEY, "supabaseAnonKey")
            };

            if (!config.supabaseUrl || !config.supabaseAnonKey) {
              console.error("Supabase secrets are empty after cleanup.");
              process.exit(1);
            }

            if (!/^https:\/\/.+/i.test(config.supabaseUrl)) {
              console.error("Invalid SUPABASE_URL:", config.supabaseUrl);
              process.exit(1);
            }

            fs.writeFileSync(
              "config.js",
              "window.APP_CONFIG = " + JSON.stringify(config, null, 2) + ";\n"
            );
            console.log("Wrote config.js for", config.supabaseUrl);
            NODE
          else
            cp config.example.js config.js
          fi
      - name: Verify config.js
        run: node -e "const fs=require('fs'); const src=fs.readFileSync('config.js','utf8'); if (!/supabaseUrl/.test(src) || /YOUR_PROJECT/.test(src)) { throw new Error('config.js missing valid Supabase settings'); }"
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
